<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Latino - Control de Cuentas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --emby-color: #00a4dc;
            --jelly-color: #aa5cc5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .instruction {
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-emby {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-bottom: 4px solid #0052b4;
        }

        .btn-jelly99 {
            background: linear-gradient(135deg, #b92b27, #1565c0);
            border-bottom: 4px solid #0d47a1;
        }

        .btn-jelly90 {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            border-bottom: 4px solid #310097;
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">VIDEO LATINO</div>
        <div class="subtitle">Portal de Usuarios</div>
        
        <p class="instruction">
            Selecciona el servidor donde se encuentra tu cuenta para verificar tus días restantes de servicio.
        </p>

        <div class="btn-list">
            <a href="http://emby.videolatino.net:8056/my/account" target="_blank" class="btn btn-emby">
                Servidor EMBY VIP
            </a>

            <a href="http://jelly99.videolatino.net:8056/my/account" target="_blank" class="btn btn-jelly99">
                Servidor JELLYFIN 1 (99)
            </a>

            <a href="http://jelly90.videolatino.net:8056/my/account" target="_blank" class="btn btn-jelly90">
                Servidor JELLYFIN 2 (90)
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Video Latino. Todos los derechos reservados.
        </div>
    </div>

</body>
</html>
