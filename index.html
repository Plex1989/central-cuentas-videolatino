<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Latino - Portal de Cuentas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores de Marca y Neón */
            --primary-glow: rgba(0, 242, 254, 0.4);
            --emby-color: #00a4dc;
            --jelly-color: #00e676;
            --jelly2-color: #f107a3;
            --text-color: #ffffff;
            --text-muted: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            
            /* Fondo de Pantalla Cinematográfico de Alta Calidad */
            background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        /* Capa de oscurecimiento y desenfoque profesional para el fondo */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(7, 7, 15, 0.9) 0%, rgba(15, 10, 25, 0.85) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 2;
            
            /* Tarjeta Flotante estilo Cristal (Glassmorphism) */
            background: rgba(18, 18, 29, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 30px rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease;
        }

        /* Contenedor del Logo con brillo radial trasero para darle contraste */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
        }

        /* El Logo PNG con su glow blanco/cian para evitar que se pierdan los bordes negros */
        .logo-img {
            width: 145px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.7)) 
                    drop-shadow(0 0 20px rgba(0, 242, 254, 0.3));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-img:hover {
            transform: scale(1.08) rotate(2deg);
        }

        .logo {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.2);
        }

        .subtitle {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ff4b2b;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 75, 43, 0.3);
        }

        .instruction {
            font-size: 14.5px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 35px;
            font-weight: 300;
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* Botones estilo Cristal con Bordes de Neón e interactividad fluida */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15.5px;
            color: var(--text-color);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: all 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Estados Hover personalizados para simular iluminación */
        .btn-emby {
            border-left: 4px solid var(--emby-color);
        }
        .btn-emby:hover {
            background: rgba(0, 164, 220, 0.15);
            border-color: var(--emby-color);
            box-shadow: 0 0 25px rgba(0, 164, 220, 0.3);
            transform: translateY(-3px);
        }

        .btn-jelly1 {
            border-left: 4px solid var(--jelly-color);
        }
        .btn-jelly1:hover {
            background: rgba(0, 230, 118, 0.15);
            border-color: var(--jelly-color);
            box-shadow: 0 0 25px rgba(0, 230, 118, 0.3);
            transform: translateY(-3px);
        }

        .btn-jelly2 {
            border-left: 4px solid var(--jelly2-color);
        }
        .btn-jelly2:hover {
            background: rgba(241, 7, 163, 0.15);
            border-color: var(--jelly2-color);
            box-shadow: 0 0 25px rgba(241, 7, 163, 0.3);
            transform: translateY(-3px);
        }

        /* Comportamiento al hacer clic en móvil (Efecto de pulsación física) */
        .btn:active {
            transform: scale(0.97) translateY(-1px);
        }

        .footer {
            margin-top: 45px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo envuelto con glow de contraste trasero -->
        <div class="logo-wrapper">
            <img src="logo.png" alt="Logo Pixel Studio" class="logo-img">
        </div>
        
        <div class="logo">VIDEO LATINO</div>
        <div class="subtitle">Portal de Usuarios</div>
        
        <p class="instruction">
            Selecciona tu servidor de streaming para revisar y gestionar tus días de servicio activos.
        </p>

        <div class="btn-list">
            <!-- BOTÓN EMBY -->
            <a href="http://emby.videolatino.net:8056/my/account" target="_blank" class="btn btn-emby">
                Servidor EMBY VIP
            </a>

            <!-- BOTÓN JELLYFIN 1 -->
            <a href="http://jelly99.videolatino.net:8056/my/account" target="_blank" class="btn btn-jelly1">
                Servidor JELLYFIN 1 (99)
            </a>

            <!-- BOTÓN JELLYFIN 2 -->
            <a href="http://jelly90.videolatino.net:8056/my/account" target="_blank" class="btn btn-jelly2">
                Servidor JELLYFIN 2 (90)
            </a>
        </div>

        <div class="footer">
            &copy; 2026 Video Latino &bull; Premium Experience
        </div>
    </div>

</body>
</html>
