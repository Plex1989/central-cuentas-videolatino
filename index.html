<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Latino - Portal de Cuentas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --emby-glow: rgba(0, 164, 220, 0.4);
            --jelly1-glow: rgba(0, 230, 118, 0.4);
            --jelly2-glow: rgba(241, 7, 163, 0.4);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #04060a;
        }

        /* Fondo de Pantalla Cinematográfico de Alta Calidad */
        .cinema-bg {
            background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1600&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
        }

        /* Estilo premium de vidrio esmerilado con bisel de luz (Glassmorphism) */
        .glass-card {
            background: rgba(10, 15, 26, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1);
        }

        /* Esferas de energía de neón animadas de fondo para dar más atmósfera */
        .neon-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            animation: pulse-slow 10s infinite alternate;
        }

        @keyframes pulse-slow {
            0% { transform: scale(1) translate(0px, 0px); }
            100% { transform: scale(1.25) translate(30px, -50px); }
        }
    </style>
</head>
<body class="cinema-bg text-slate-100 min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <div class="absolute inset-0 bg-gradient-to-br from-[#07070f]/95 via-[#0e0a19]/90 to-[#07070f]/95 z-0"></div>

    <div class="neon-orb w-[450px] h-[450px] bg-cyan-500 top-[-5%] left-[-10%]"></div>
    <div class="neon-orb w-[500px] h-[500px] bg-[#f107a3] bottom-[5%] right-[-10%]" style="animation-delay: 4s;"></div>

    <main class="container mx-auto px-4 py-10 md:py-16 max-w-6xl relative z-10 flex-grow flex flex-col justify-center items-center">
        
        <div class="text-center mb-14 group">
            <div class="relative inline-block">
                <div class="absolute inset-0 bg-cyan-500/10 rounded-full blur-2xl group-hover:bg-cyan-500/20 transition-all duration-700"></div>
                <img src="logo.png" alt="Logo Pixel Studio" class="relative mx-auto w-48 md:w-56 h-auto drop-shadow-[0_0_35px_rgba(6,182,212,0.4)] transition-transform duration-500 group-hover:scale-105">
            </div>
            
            <h1 class="text-3xl md:text-4xl font-extrabold mt-6 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-sky-200 to-blue-400">
                VIDEO LATINO
            </h1>
            <div class="text-[11px] font-bold text-[#ff4b2b] uppercase tracking-[4px] mt-2 text-shadow-[0_0_10px_rgba(255,75,43,0.3)]">
                Portal de Usuarios
            </div>
            <div class="h-[2px] w-24 bg-gradient-to-r from-cyan-500 via-emerald-500 to-pink-500 mx-auto mt-4 rounded-full shadow-[0_0_12px_rgba(6,182,212,0.8)]"></div>
            
            <p class="text-sm md:text-base text-slate-300 mt-5 max-w-lg mx-auto font-light leading-relaxed">
                Selecciona tu servidor de streaming para revisar y gestionar tus días de servicio activos de manera segura y directa.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl px-2">
